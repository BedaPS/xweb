<header class="navigation">
  <div class="container">
    <nav class="navbar navbar-expand-lg navbar-light">
      <a class="navbar-brand" href="{{ site.BaseURL }}">
        {{ with site.Params.logo }}
        <span class="brand-logo-wrap">
          <img width="{{ site.Params.logo_width }}" class="img-fluid" src="{{ . | absURL }}" alt="{{ site.Title }}">
        </span>
        {{ else }}
        {{ site.Title }}
        {{ end }}
      </a>

      <button class="navbar-toggler border-0" type="button" data-toggle="collapse" data-target="#navigation" aria-label="Toggle navigation">
        <i class="ti-menu h4 mb-0"></i>
      </button>

      <div class="collapse navbar-collapse" id="navigation">
        <div class="navigation-actions ml-auto">
          <ul class="navbar-nav align-items-lg-center">
            {{ range site.Menus.main }}
            <li class="nav-item">
              <a class="nav-link" href="{{ .URL | absURL }}">{{ .Name }}</a>
            </li>
            {{ end }}
          </ul>

          {{ if site.Params.navigation_button.enable }}
          {{ with site.Params.navigation_button }}
          <a href="{{ .link | absURL }}" class="btn btn-sm btn-primary navigation-cta mt-4 mt-lg-0">{{ .label }}</a>
          {{ end }}
          {{ end }}
        </div>
      </div>
    </nav>
  </div>
</header>

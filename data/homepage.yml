####################### Banner #########################
banner:
  eyebrow: "Architecture, delivery, and support for complex software systems"
  title: "Engineering robust platforms for teams with real operational complexity."
  content: "Xnihilo builds, modernizes, and supports healthcare, education, and operations systems with strong architecture, integration discipline, and production-ready engineering."
  image: "images/banner-art.svg"
  primary_button:
    enable: true
    label: "Contact Us"
    link: "contact"
  secondary_button:
    enable: true
    label: "About Xnihilo"
    link: "about"
  highlights:
    - "Healthcare, payer, and laboratory systems"
    - "CMS, commerce, and custom application engineering"
    - "Cloud platforms, automation, and managed operations"
  spotlight_title: "Engineering principles"
  spotlight_item:
    - title: "Architecture with operational context"
      content: "We design around workflows, integration boundaries, security requirements, and failure modes so systems hold up under real use."
    - title: "Engineering depth across the stack"
      content: "From application design to APIs, automation, infrastructure, and delivery, implementation stays aligned with architectural intent."
    - title: "Maintainability as a core requirement"
      content: "We prioritize clean systems, observable behavior, and resilient foundations that are easier to extend, operate, and support."


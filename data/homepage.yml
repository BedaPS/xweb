      icon: "ti-pulse"
      content: "Integrated solutions for clinical, administrative, legal, and financial workflows with dependable operational visibility."

    - name: "Pharmacy Operations"
      icon: "ti-package"
      content: "Dispensing, refill workflows, reminders, and medication management delivered through a centralized, scalable platform."

    - name: "Laboratory Platforms"
      icon: "ti-alarm-clock"
      content: "Sample management, instrument integration, and lab workflow automation built for quality, speed, and traceability."

    - name: "University and School Platforms"
      icon: "ti-credit-card"
      content: "Institutional systems that connect academic, administrative, and financial operations in one clear experience."


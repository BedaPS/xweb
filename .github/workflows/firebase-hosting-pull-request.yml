name: Deploy to Firebase Hosting on PR
'on': pull_request
jobs:
  build_and_preview:
    env:
      TINA_CLIENT_ID: ${{ secrets.TINA_CLIENT_ID }}
      TINA_TOKEN: ${{ secrets.TINA_TOKEN }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install npm dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true
      - name: Build Tina Admin (if configured)
        run: |
          if [ -n "$TINA_CLIENT_ID" ] && [ -n "$TINA_TOKEN" ]; then
            npx tinacms build;
          else
            echo "Skipping Tina build (no TINA credentials)";
          fi
      - name: Build Hugo site
        run: hugo --minify --cleanDestinationDir
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_XNIHILO_25BCF }}'
          projectId: xnihilo-25bcf
        env:
          FIREBASE_CLI_PREVIEWS: hostingchannels
